<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>⚡️ Delv.ai</title>

<style>
*{box-sizing:border-box}
html,body{
  margin:0;padding:0;min-height:100dvh;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  background:
    radial-gradient(circle at 20% 10%,#1e3a8a 0%,transparent 40%),
    radial-gradient(circle at 80% 90%,#4c1d95 0%,transparent 45%),
    linear-gradient(180deg,#020617,#020617 60%,#030712);
  color:#e5e7eb;
}
.app{max-width:760px;margin:auto;min-height:100dvh;display:flex;flex-direction:column;padding:14px}
.header{text-align:center;margin-bottom:10px}
.logo{font-size:22px;font-weight:700;color:#93c5fd;text-shadow:0 0 14px rgba(59,130,246,.8)}
.tagline{font-size:13px;opacity:.8}

select,textarea,button{font-family:inherit}

select{
  width:100%;padding:10px 12px;border-radius:14px;
  background:rgba(255,255,255,.1);color:#e5e7eb;border:none;margin-bottom:10px
}

.chat{
  flex:1;overflow-y:auto;padding:14px;border-radius:20px;
  background:rgba(255,255,255,.06);
  backdrop-filter:blur(22px);
  border:1px solid rgba(255,255,255,.12);
  box-shadow:0 30px 80px rgba(0,0,0,.6)
}

.msg{display:flex;gap:10px;margin-bottom:14px;font-size:14px;cursor:pointer}
.msg.user{flex-direction:row-reverse}
.avatar{
  width:36px;height:36px;border-radius:50%;
  background-size:cover;background-position:center
}
.bubble{padding:10px 14px;border-radius:16px;max-width:80%;line-height:1.5}
.user .bubble{background:linear-gradient(135deg,#2563eb,#4f46e5)}
.ai .bubble{background:rgba(255,255,255,.1)}
.name{font-size:11px;opacity:.6;margin-bottom:4px}

.reply-bar{
  display:none;
  background:rgba(0,0,0,.4);
  padding:8px 12px;
  border-radius:12px;
  font-size:12px;
  margin-bottom:6px
}

.input-bar{display:flex;gap:8px;margin-top:8px}
textarea{
  flex:1;height:52px;resize:none;padding:12px;border-radius:16px;
  border:none;outline:none;font-size:14px;color:#e5e7eb;
  background:rgba(255,255,255,.12)
}
button{
  width:52px;height:52px;border-radius:50%;border:none;
  cursor:pointer;font-size:20px;
  background:linear-gradient(135deg,#22d3ee,#3b82f6);
  color:#020617
}

#emojiBox{
  display:none;margin-top:6px;padding:8px;border-radius:14px;
  background:rgba(0,0,0,.4)
}
#emojiBox span{cursor:pointer;font-size:18px;margin:4px}
</style>
</head>

<body>
<div class="app">

<div class="header">
  <div class="logo">⚡️ Delv.ai</div>
  <div class="tagline">Explore answers. Instantly.</div>
</div>

<select id="model">
  <option value="deepseek">DeepSeek</option>
  <option value="openai-fast">OpenAI</option>
  <option value="perplexity-fast">Perplexity</option>
  <option value="grok">Grok</option>
  <option value="gemini-fast">Gemini</option>
  <option value="glm">GLM</option>
</select>

<div class="chat" id="chat"></div>

<div class="reply-bar" id="replyBar"></div>

<div id="emojiBox">
  <span>😀</span><span>😂</span><span>😍</span><span>🤯</span>
  <span>🚀</span><span>🔥</span><span>💡</span><span>❤️</span>
</div>

<div class="input-bar">
  <button onclick="toggleEmoji()">😊</button>
  <textarea id="input" placeholder="Reply or @model…"></textarea>
  <button onclick="send()">➤</button>
</div>

</div>

<script>
const API_URL = "https://rrasd12ww-chatbot-ai.hf.space/chat";

const avatars = {
  user: "https://api.dicebear.com/7.x/thumbs/svg?seed=user",
  grok: "https://logo.clearbit.com/x.ai",
  gemini: "https://logo.clearbit.com/google.com",
  "openai-fast": "https://logo.clearbit.com/openai.com",
  "perplexity-fast": "https://logo.clearbit.com/perplexity.ai",
  deepseek: "https://logo.clearbit.com/deepseek.com",
  glm: "https://logo.clearbit.com/zhipu.ai"
};

const chat = document.getElementById("chat");
const input = document.getElementById("input");
const replyBar = document.getElementById("replyBar");
let replyContext = null;

function add(role, name, text, model=null) {
  const div = document.createElement("div");
  div.className = "msg " + role;
  div.onclick = () => setReply(text, name);
  div.innerHTML = `
    <div class="avatar" style="background-image:url('${avatars[model||role]}')"></div>
    <div>
      <div class="name">${name}</div>
      <div class="bubble">${text}</div>
    </div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function setReply(text, name) {
  replyContext = text;
  replyBar.style.display = "block";
  replyBar.textContent = `Replying to ${name}: "${text.slice(0,80)}"`;
}

function toggleEmoji(){
  emojiBox.style.display = emojiBox.style.display==="block"?"none":"block";
}
emojiBox.onclick = e=>{
  if(e.target.textContent) input.value+=e.target.textContent;
};

async function send(){
  const text = input.value.trim();
  if(!text) return;
  input.value="";

  add("user","You",text);

  const mention = text.match(/@(deepseek|grok|openai-fast|gemini-fast|perplexity-fast|glm)/i);
  if(!mention) return;

  let prompt = text;
  if(replyContext){
    prompt =
`Someone said:
"${replyContext}"

The user asks:
"${text.replace(mention[0],'')}"

Explain clearly what the person means and what they are trying to say.`;
  }

  replyContext=null;
  replyBar.style.display="none";

  const res = await fetch(API_URL,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({message:prompt,model:mention[1]})
  });

  const data = await res.json();
  add("ai",mention[1],data.reply,mention[1]);
}
</script>

</body>
</html>
