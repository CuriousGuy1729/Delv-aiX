<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>⚡ Delv.ai</title>

<style>
:root{
  --bg:#020617;
  --panel:#020617cc;
  --accent:#7c3aed;
  --accent2:#22d3ee;
  --text:#e5e7eb;
  --muted:#9ca3af;
}

*{box-sizing:border-box}
html,body{
  margin:0;height:100%;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  background:
    radial-gradient(circle at 20% 10%, #312e81 0%, transparent 45%),
    radial-gradient(circle at 80% 90%, #4c1d95 0%, transparent 45%),
    linear-gradient(180deg,#020617,#020617);
  color:var(--text);
}

/* === LAYOUT === */
.app{
  display:flex;
  height:100vh;
}

/* === SIDEBAR === */
.sidebar{
  width:72px;
  background:rgba(2,6,23,.85);
  border-right:1px solid rgba(255,255,255,.08);
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:10px 0;
  gap:12px;
}

.server{
  width:48px;height:48px;
  border-radius:16px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:grid;place-items:center;
  font-weight:700;
  box-shadow:0 0 18px rgba(124,58,237,.8);
  cursor:pointer;
}

.server.small{
  background:#111827;
  box-shadow:none;
}

/* === MAIN === */
.main{
  flex:1;
  display:flex;
  flex-direction:column;
  padding:12px;
}

.header{
  height:48px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 14px;
  background:var(--panel);
  border-radius:14px;
  margin-bottom:8px;
}

.title{
  font-weight:700;
  color:#c7d2fe;
}

.status{
  font-size:12px;
  color:var(--muted);
}

/* === CHAT === */
.chat{
  flex:1;
  overflow-y:auto;
  padding:14px;
  background:var(--panel);
  border-radius:20px;
  border:1px solid rgba(255,255,255,.08);
}

.msg{
  display:flex;
  gap:10px;
  margin-bottom:16px;
}

.avatar{
  width:40px;height:40px;
  border-radius:50%;
  background-size:cover;
  background-position:center;
  flex-shrink:0;
}

.bubble{
  background:rgba(255,255,255,.06);
  padding:10px 14px;
  border-radius:16px;
  max-width:75%;
  transition:.2s;
}

.bubble:hover{
  box-shadow:0 0 20px rgba(124,58,237,.25);
}

.user .bubble{
  background:linear-gradient(135deg,#2563eb,#4f46e5);
}

.name{
  font-size:12px;
  opacity:.7;
  margin-bottom:4px;
}

/* === REPLY BAR === */
.reply{
  display:none;
  background:rgba(0,0,0,.45);
  padding:8px 12px;
  border-radius:12px;
  font-size:12px;
  margin:8px 0;
}

/* === INPUT === */
.input{
  display:flex;
  gap:10px;
  margin-top:8px;
}

textarea{
  flex:1;
  height:52px;
  resize:none;
  border:none;
  outline:none;
  border-radius:16px;
  padding:14px;
  background:#020617;
  color:var(--text);
}

button{
  width:52px;height:52px;
  border-radius:50%;
  border:none;
  cursor:pointer;
  font-size:20px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#020617;
  box-shadow:0 0 18px rgba(124,58,237,.7);
}

/* === MODEL PICKER === */
.picker{
  display:none;
  position:absolute;
  bottom:72px;
  left:90px;
  background:#020617f0;
  border:1px solid rgba(255,255,255,.12);
  border-radius:14px;
  padding:6px;
  width:260px;
}

.pick{
  display:flex;
  align-items:center;
  gap:10px;
  padding:8px;
  border-radius:10px;
  cursor:pointer;
}
.pick:hover{background:rgba(255,255,255,.08)}

.pick img{width:24px;height:24px;border-radius:50%}
</style>
</head>

<body>

<div class="app">

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="server">⚡</div>
  <div class="server small">+</div>
</div>

<!-- MAIN -->
<div class="main">

  <div class="header">
    <div class="title">Delv.ai · space-chat</div>
    <div class="status">online</div>
  </div>

  <div class="chat" id="chat"></div>
  <div class="reply" id="reply"></div>

  <div class="input">
    <textarea id="input" placeholder="Type @ to ping an AI…"></textarea>
    <button onclick="send()">➤</button>
  </div>

  <div class="picker" id="picker"></div>

</div>
</div>

<script>
const API_URL="https://rrasd12ww-chatbot-ai.hf.space/chat";

const models={
  grok:{n:"Grok",a:"https://logo.clearbit.com/x.ai"},
  "openai-fast":{n:"OpenAI",a:"https://logo.clearbit.com/openai.com"},
  "gemini-fast":{n:"Gemini",a:"https://logo.clearbit.com/google.com"},
  "perplexity-fast":{n:"Perplexity",a:"https://logo.clearbit.com/perplexity.ai"},
  deepseek:{n:"DeepSeek",a:"https://logo.clearbit.com/deepseek.com"},
  glm:{n:"GLM",a:"https://logo.clearbit.com/zhipu.ai"}
};

const chat=document.getElementById("chat");
const input=document.getElementById("input");
const picker=document.getElementById("picker");
const reply=document.getElementById("reply");
let replyCtx=null;

function msg(role,name,text,model=null){
  const d=document.createElement("div");
  d.className="msg "+role;
  d.onclick=()=>{replyCtx=text;reply.style.display="block";reply.textContent="Replying to: "+text.slice(0,80)};
  d.innerHTML=`
    <div class="avatar" style="background-image:url('${model?models[model].a:"https://api.dicebear.com/7.x/thumbs/svg?seed=user"}')"></div>
    <div>
      <div class="name">${name}</div>
      <div class="bubble">${text}</div>
    </div>`;
  chat.appendChild(d);
  chat.scrollTop=chat.scrollHeight;
}

input.addEventListener("input",()=>{
  if(input.value.endsWith("@")){
    picker.innerHTML="";
    for(const k in models){
      picker.innerHTML+=`
        <div class="pick" onclick="pick('${k}')">
          <img src="${models[k].a}"><span>${models[k].n}</span>
        </div>`;
    }
    picker.style.display="block";
  }
});

function pick(m){
  input.value+=m+" ";
  picker.style.display="none";
}

async function send(){
  const t=input.value.trim();
  if(!t) return;
  input.value="";
  msg("user","You",t);

  const m=t.match(/@(grok|openai-fast|gemini-fast|perplexity-fast|deepseek|glm)/);
  if(!m) return;

  let p=t;
  if(replyCtx){
    p=`Someone said: "${replyCtx}"\nExplain what they mean.\nUser: ${t}`;
    replyCtx=null;
    reply.style.display="none";
  }

  try{
    const r=await fetch(API_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({message:p,model:m[1]})});
    const raw=await r.text();
    const j=JSON.parse(raw);
    msg("ai",models[m[1]].n,j.reply,m[1]);
  }catch{
    msg("ai","System","AI backend sleeping ⚠️","grok");
  }
}
</script>

</body>
  </html>
