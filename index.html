<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ Delv.ai</title>

<style>
:root{
  --bg:#020617;
  --panel:#020617cc;
  --accent:#7c3aed;
  --accent2:#22d3ee;
  --text:#e5e7eb;
  --muted:#9ca3af;
}
*{box-sizing:border-box}
html,body{
  margin:0;height:100%;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  background:
    radial-gradient(circle at 20% 10%, #312e81 0%, transparent 45%),
    radial-gradient(circle at 80% 90%, #4c1d95 0%, transparent 45%),
    linear-gradient(180deg,#020617,#020617);
  color:var(--text);
}

/* ===== LOGIN ===== */
.login{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}
.login-box{
  width:320px;
  background:var(--panel);
  padding:24px;
  border-radius:20px;
  border:1px solid rgba(255,255,255,.08);
  box-shadow:0 0 40px rgba(124,58,237,.4);
}
.login-box h1{
  text-align:center;
  margin-bottom:16px;
}
.login-box input{
  width:100%;
  padding:12px;
  border-radius:14px;
  border:none;
  outline:none;
  background:#020617;
  color:var(--text);
}
.login-box button{
  width:100%;
  margin-top:12px;
  padding:12px;
  border-radius:14px;
  border:none;
  font-weight:700;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#020617;
  cursor:pointer;
}

/* ===== APP ===== */
.app{
  display:none;
  height:100vh;
}

/* Sidebar */
.sidebar{
  width:72px;
  background:rgba(2,6,23,.85);
  border-right:1px solid rgba(255,255,255,.08);
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:10px 0;
}
.server{
  width:48px;height:48px;
  border-radius:16px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:grid;place-items:center;
  font-weight:700;
  box-shadow:0 0 18px rgba(124,58,237,.8);
}

/* Main */
.main{
  flex:1;
  display:flex;
  flex-direction:column;
  padding:12px;
}
.header{
  height:48px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 14px;
  background:var(--panel);
  border-radius:14px;
  margin-bottom:8px;
}
.title{font-weight:700;color:#c7d2fe}
.status{font-size:12px;color:var(--muted)}

.chat{
  flex:1;
  overflow-y:auto;
  padding:14px;
  background:var(--panel);
  border-radius:20px;
  border:1px solid rgba(255,255,255,.08);
}

.msg{
  display:flex;
  gap:10px;
  margin-bottom:16px;
  cursor:pointer;
}
.avatar{
  width:40px;height:40px;
  border-radius:50%;
  background-image:url("https://api.dicebear.com/7.x/thumbs/svg?seed=user");
  background-size:cover;
}
.bubble{
  background:rgba(255,255,255,.06);
  padding:10px 14px;
  border-radius:16px;
  max-width:75%;
}
.bubble:hover{
  box-shadow:0 0 20px rgba(124,58,237,.25);
}
.name{
  font-size:12px;
  opacity:.7;
  margin-bottom:4px;
}

/* Input */
.input{
  display:flex;
  gap:10px;
  margin-top:8px;
  position:relative;
}
textarea{
  flex:1;
  height:52px;
  resize:none;
  border:none;
  outline:none;
  border-radius:16px;
  padding:14px;
  background:#020617;
  color:var(--text);
}
button{
  width:52px;height:52px;
  border-radius:50%;
  border:none;
  cursor:pointer;
  font-size:20px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#020617;
}

/* Model picker */
.picker{
  display:none;
  position:absolute;
  bottom:64px;
  left:0;
  background:#020617f0;
  border:1px solid rgba(255,255,255,.12);
  border-radius:14px;
  padding:6px;
  width:260px;
}
.pick{
  display:flex;
  align-items:center;
  gap:10px;
  padding:8px;
  border-radius:10px;
  cursor:pointer;
}
.pick:hover{background:rgba(255,255,255,.08)}
.pick img{width:24px;height:24px;border-radius:50%}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login" id="login">
  <div class="login-box">
    <h1>⚡ Delv.ai</h1>
    <input id="usernameInput" placeholder="Choose a username" />
    <button onclick="enter()">Enter</button>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">
  <div class="sidebar">
    <div class="server">⚡</div>
  </div>

  <div class="main">
    <div class="header">
      <div class="title">Public · space-chat</div>
      <div class="status" id="status"></div>
    </div>

    <div class="chat" id="chat"></div>

    <div class="input">
      <textarea id="input" placeholder="Type @ to ping an AI…"></textarea>
      <button onclick="send()">➤</button>
      <div class="picker" id="picker"></div>
    </div>
  </div>
</div>

<script>
const API_URL="https://rrasd12ww-chatbot-ai.hf.space/chat";

const models={
  grok:{n:"Grok",a:"https://logo.clearbit.com/x.ai"},
  "openai-fast":{n:"OpenAI",a:"https://logo.clearbit.com/openai.com"},
  "gemini-fast":{n:"Gemini",a:"https://logo.clearbit.com/google.com"},
  "perplexity-fast":{n:"Perplexity",a:"https://logo.clearbit.com/perplexity.ai"},
  deepseek:{n:"DeepSeek",a:"https://logo.clearbit.com/deepseek.com"},
  glm:{n:"GLM",a:"https://logo.clearbit.com/zhipu.ai"}
};

let username = localStorage.getItem("delv_user");
const login=document.getElementById("login");
const app=document.getElementById("app");
const chat=document.getElementById("chat");
const input=document.getElementById("input");
const picker=document.getElementById("picker");
const status=document.getElementById("status");

if(username){ login.style.display="none"; app.style.display="flex"; status.textContent=username; }

function enter(){
  const u=document.getElementById("usernameInput").value.trim();
  if(!u) return;
  username=u;
  localStorage.setItem("delv_user",u);
  login.style.display="none";
  app.style.display="flex";
  status.textContent=u;
}

function addMsg(name,text){
  const d=document.createElement("div");
  d.className="msg";
  d.innerHTML=`
    <div class="avatar"></div>
    <div>
      <div class="name">${name}</div>
      <div class="bubble">${text}</div>
    </div>`;
  chat.appendChild(d);
  chat.scrollTop=chat.scrollHeight;
}

input.addEventListener("input",()=>{
  if(input.value.endsWith("@")){
    picker.innerHTML="";
    for(const k in models){
      picker.innerHTML+=`
        <div class="pick" onclick="pick('${k}')">
          <img src="${models[k].a}">
          <span>${models[k].n}</span>
        </div>`;
    }
    picker.style.display="block";
  }
});

function pick(m){
  input.value+=m+" ";
  picker.style.display="none";
}

async function send(){
  const t=input.value.trim();
  if(!t) return;
  input.value="";
  addMsg(username,t);

  const m=t.match(/@(grok|openai-fast|gemini-fast|perplexity-fast|deepseek|glm)/);
  if(!m) return;

  try{
    const r=await fetch(API_URL,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({message:t,model:m[1]})
    });
    const raw=await r.text();
    const j=JSON.parse(raw);
    addMsg(models[m[1]].n,j.reply);
  }catch{
    addMsg("System","AI backend sleeping ⚠️");
  }
}
</script>

</body>
</html>
